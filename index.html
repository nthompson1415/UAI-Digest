<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UAI Weekly AI Digest</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <style>
    :root {
      --bg-primary: #0a0a0d;
      --bg-secondary: #12121a;
      --bg-card: rgba(255,255,255,0.03);
      --bg-card-hover: rgba(249,115,22,0.06);
      --accent: #f97316;
      --accent-dim: rgba(249,115,22,0.65);
      --accent-glow: rgba(249,115,22,0.1);
      --text-primary: #e8e8ec;
      --text-secondary: #9ca3af;
      --text-muted: #4b5563;
      --border: rgba(255,255,255,0.08);
      --border-accent: rgba(249,115,22,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle gradient overlay — techy, not CRT */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(249,115,22,0.04) 0%, transparent 60%);
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9998;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .container {
      max-width: 780px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 60px 0 40px;
      animation: fadeDown 0.6s ease;
    }

    .header__signal {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 6px;
      opacity: 0.5;
      margin-bottom: 24px;
    }

    .header__title {
      font-family: 'Outfit', sans-serif;
      font-size: clamp(36px, 8vw, 56px);
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 10px;
      background: linear-gradient(
        90deg,
        #fff 0%, #fff 40%,
        var(--accent) 50%,
        #fff 60%, #fff 100%
      );
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    .header__subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .header__byline {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .header__date {
      display: inline-block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 6px 18px;
      border: 1px solid var(--border);
      border-radius: 3px;
    }

    .header__divider {
      width: 60px;
      height: 1px;
      background: var(--accent);
      opacity: 0.3;
      margin: 32px auto 0;
    }

    /* ── Loading ── */
    .loading {
      text-align: center;
      padding: 80px 0;
    }

    .loading__dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-bottom: 20px;
    }

    .loading__dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0;
      animation: dotBlink 1.4s ease infinite;
    }

    .loading__dots span:nth-child(1) { animation-delay: 0s; }
    .loading__dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading__dots span:nth-child(3) { animation-delay: 0.4s; }

    .loading__text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--accent-dim);
      letter-spacing: 3px;
    }

    /* ── Error ── */
    .error {
      text-align: center;
      padding: 60px 20px;
      border: 1px solid rgba(255,65,65,0.15);
      border-radius: 6px;
      background: rgba(255,65,65,0.03);
    }

    .error__title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: #ff6b6b;
      letter-spacing: 2px;
      margin-bottom: 12px;
    }

    .error__detail {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .error__detail a {
      color: var(--accent);
    }

    /* ── Category Cards (Homepage) ── */
    .category-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .category-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 16px 18px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
      text-align: left;
      opacity: 0;
    }

    .category-card.is-visible {
      opacity: 1;
      animation: cardReveal 0.4s ease forwards;
    }

    .category-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-accent);
      transform: translateY(-2px);
      box-shadow: 0 4px 24px rgba(249,115,22,0.08);
    }

    .category-card.is-expanded {
      border-color: var(--border-accent);
      background: var(--bg-card-hover);
      transform: none;
      box-shadow: 0 0 0 1px rgba(249,115,22,0.1);
    }

    .category-card__header {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .category-card__header::after {
      content: '→';
      font-size: 11px;
      opacity: 0.5;
      transition: transform 0.2s ease;
    }

    .category-card.is-expanded .category-card__header::after {
      content: '↑';
    }

    .category-card__preview {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .category-card__preview-item {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
      padding: 2px 0;
    }

    .category-card__preview-item::before {
      content: '· ';
      color: var(--accent-dim);
    }

    .category-card__expand {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.35s ease;
      overflow: hidden;
    }

    .category-card__expand-inner {
      overflow: hidden;
      padding-top: 0;
      transition: padding-top 0.35s ease;
    }

    .category-card.is-expanded .category-card__expand {
      grid-template-rows: 1fr;
    }

    .category-card.is-expanded .category-card__expand-inner {
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }

    .category-card__expand .digest {
      margin: 0;
    }

    .category-card__expand .digest h2 {
      display: none;
    }

    .category-card__expand .digest hr {
      margin: 16px 0;
    }

    .digest--sources {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }

    .digest--sources h2 {
      margin-top: 0;
    }

    /* Flagged sources note — callout box (overrides .digest h3 { display: none }) */
    .digest--sources h3 {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin: 0 0 10px;
      padding: 12px 14px;
      background: rgba(249,115,22,0.08);
      border: 1px solid var(--border-accent);
      border-radius: 4px;
    }

    .digest--sources h3 + p {
      margin: 0 0 20px;
      padding: 10px 14px 14px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
      background: rgba(249,115,22,0.08);
      border: 1px solid var(--border-accent);
      border-top: none;
      border-radius: 0 0 4px 4px;
    }

    /* ── Digest Content ── */
    .digest {
      animation: fadeUp 0.5s ease;
    }

    .digest h2 {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 16px 0 12px;
      border-bottom: 1px solid var(--border);
      margin-top: 36px;
      margin-bottom: 16px;
    }

    .digest h3 {
      display: none; /* Hide the "Brought To You" h3, it's in the header */
    }

    /* First h1 and first few elements are the header — hide them since we have our own */
    .digest > h1:first-child,
    .digest > h3:first-of-type,
    .digest > p:first-of-type,
    .digest > hr:first-of-type {
      display: none;
    }

    .digest p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .digest p strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .digest p a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(249,115,22,0.35);
      padding-bottom: 1px;
      transition: border-color 0.2s ease;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
    }

    .digest p a:hover {
      border-color: var(--accent);
    }

    /* Each news item block styling */
    .digest p:has(strong) {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 14px 16px 4px;
      margin-bottom: 0;
      margin-top: 10px;
      transition: all 0.2s ease;
    }

    .digest p:has(strong):hover {
      background: var(--bg-card-hover);
      border-color: var(--border-accent);
    }

    .digest p:has(strong) + p {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0;
      padding: 0 16px 4px;
      margin-bottom: 0;
    }

    .digest p:has(strong) + p + p {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 4px 4px;
      padding: 0 16px 14px;
      margin-bottom: 0;
    }

    .digest hr {
      border: none;
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .digest em {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      font-style: normal;
    }

    .digest ol, .digest ul {
      padding-left: 0;
      list-style: none;
    }

    .digest ol li, .digest ul li {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .digest ol li a, .digest ul li a {
      color: var(--accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(249,115,22,0.25);
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 40px 0 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      line-height: 2.2;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    @keyframes dotBlink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100vh); }
    }

    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-primary); }
    ::-webkit-scrollbar-thumb { background: #2a2520; border-radius: 3px; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .container { padding: 20px 16px 60px; }
      .header { padding: 40px 0 28px; }
      .header__signal { font-size: 9px; letter-spacing: 4px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header__signal">WEEKLY AI BRIEF</div>
      <h1 class="header__title">UAI WEEKLY</h1>
      <div class="header__subtitle">AI Digest</div>
      <div class="header__byline">Brought to you by The Foundry</div>
      <div class="header__date" id="dateRange">Loading...</div>
      <div class="header__divider"></div>
    </header>

    <main id="content">
      <div class="loading">
        <div class="loading__dots">
          <span></span><span></span><span></span>
        </div>
        <div class="loading__text">LOADING DIGEST</div>
      </div>
    </main>

    <footer class="footer" id="footer" style="display:none;">
      ALL CONTENT SOURCED FROM FREELY ACCESSIBLE PUBLICATIONS<br>
      UAI × THE FOUNDRY
    </footer>
  </div>

  <script>
    const PREVIEW_ITEMS = 3;
    const HEADLINE_MAX_LEN = 72;

    function parseMarkdownWithCitations(md) {
      const html = marked.parse(md);
      const div = document.createElement('div');
      div.innerHTML = html;
      div.querySelectorAll('a[href^="http"]').forEach(a => {
        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
      return div.innerHTML;
    }

    function parseDigest(md) {
      const categories = [];
      let sourcesSection = null;
      const sections = md.split(/\n## (?=[^\n])/);

      for (const section of sections) {
        const lines = section.trim().split('\n');
        if (lines.length === 0) continue;

        const headerLine = lines[0];
        const title = headerLine.replace(/^#+\s*/, '').trim();

        if (title.includes('All Sources Cited') || title.includes('📚')) {
          sourcesSection = '## ' + section.trim();
          continue;
        }
        if (title.includes('UAI WEEKLY') || title.includes('Brought To You')) continue;

        const headlines = [];
        for (let i = 1; i < lines.length; i++) {
          const headlineMatch = lines[i].match(/^\*\*(\d+\.\s+.+?)\*\*/);
          if (headlineMatch) {
            const raw = headlineMatch[1].replace(/^\d+\.\s+/, '');
            headlines.push(raw.length > HEADLINE_MAX_LEN ? raw.slice(0, HEADLINE_MAX_LEN) + '…' : raw);
          }
        }

        if (headlines.length === 0) continue;

        const fullMarkdown = '## ' + section.trim();
        categories.push({ title, headlines, fullMarkdown });
      }

      return { categories, sourcesSection };
    }

    function truncate(str, len) {
      return str.length > len ? str.slice(0, len) + '…' : str;
    }

    function escapeHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function renderCategoryCard(cat, index) {
      const previewHeadlines = cat.headlines.slice(0, PREVIEW_ITEMS);
      const moreCount = cat.headlines.length - PREVIEW_ITEMS;

      const previewHtml = previewHeadlines
        .map(h => `<div class="category-card__preview-item">${escapeHtml(truncate(h, HEADLINE_MAX_LEN))}</div>`)
        .join('') + (moreCount > 0 ? `<div class="category-card__preview-item" style="opacity:0.6">+${moreCount} more</div>` : '');

      const expandHtml = parseMarkdownWithCitations(cat.fullMarkdown);

      return `
        <div class="category-card" data-index="${index}">
          <div class="category-card__header">${escapeHtml(cat.title)}</div>
          <div class="category-card__preview">${previewHtml}</div>
          <div class="category-card__expand">
            <div class="category-card__expand-inner">
              <div class="digest">${expandHtml}</div>
            </div>
          </div>
        </div>
      `;
    }

    async function loadDigest() {
      const contentEl = document.getElementById('content');
      const footerEl = document.getElementById('footer');
      const dateEl = document.getElementById('dateRange');

      try {
        const base = document.location.pathname.replace(/\/?$/, '/');
        const resp = await fetch(base + 'digests/latest.md');

        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

        const md = await resp.text();

        const dateMatch = md.match(/\*\*(.+?)\*\*/);
        dateEl.textContent = dateMatch ? dateMatch[1] : new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });

        const { categories, sourcesSection } = parseDigest(md);
        const cardsHtml = categories.map((c, i) => renderCategoryCard(c, i)).join('');
        const sourcesHtml = sourcesSection
          ? `<div class="digest digest--sources">${parseMarkdownWithCitations(sourcesSection)}</div>`
          : '';
        contentEl.innerHTML = `<div class="category-grid">${cardsHtml}</div>${sourcesHtml}`;
        footerEl.style.display = 'block';

        // Staggered card reveal via Intersection Observer
        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const card = entry.target;
              const index = parseInt(card.dataset.index, 10);
              setTimeout(() => card.classList.add('is-visible'), index * 80);
              observer.unobserve(card);
            }
          });
        }, { threshold: 0.1 });

        contentEl.querySelectorAll('.category-card').forEach(card => {
          observer.observe(card);

          card.addEventListener('click', (e) => {
            if (e.target.closest('a')) return;
            if (e.target.closest('.category-card__expand-inner')) return;
            const wasExpanded = card.classList.contains('is-expanded');
            contentEl.querySelectorAll('.category-card').forEach(c => c.classList.remove('is-expanded'));
            if (!wasExpanded) card.classList.add('is-expanded');
          });
        });

      } catch (err) {
        contentEl.innerHTML = `
          <div class="error">
            <div class="error__title">NO DIGEST AVAILABLE YET</div>
            <div class="error__detail">
              The weekly digest hasn't been generated yet.<br>
              It runs automatically every Monday at 9:00 AM EST.<br><br>
              You can also trigger it manually from the
              <a href="https://github.com/nthompson1415/UAI-Digest/actions" target="_blank">Actions tab</a>.
            </div>
          </div>
        `;
        dateEl.textContent = 'Awaiting first run';
      }
    }

    loadDigest();
  </script>
</body>
</html>
