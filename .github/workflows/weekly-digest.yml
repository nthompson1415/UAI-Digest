name: Generate Weekly AI Digest

on:
  schedule:
    - cron: '0 14 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python generate_digest.py
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - run: |
          git config user.name "UAI Digest Bot"
          git config user.email "digest-bot@uai.club"
          git add digests/
          git diff --cached --quiet || git commit -m "📰 Weekly AI Digest - $(date +'%Y-%m-%d')"
          git push
